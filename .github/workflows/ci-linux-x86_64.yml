name: CI Linux x86-64

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Builds the x86-64-linux-debug preset from cmake/SturdyMatrix.cmake / the committed
# CMakePresets.json, natively on an x86-64 runner (only native OS/arch combos are buildable in
# CI — see SturdyMatrix.cmake's own doc comment on cross-arch/cross-OS presets being
# source-views-only).
jobs:
  build:
    name: Linux x86-64 (Debug, Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages (Ninja, Clang, GLFW's X11/Wayland dev deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang lld pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Cache third-party sources (.cache/deps)
        uses: actions/cache@v4
        with:
          path: .cache/deps
          key: deps-src-${{ hashFiles('cmake/SturdyDependencies.cmake') }}
          restore-keys: deps-src-

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-x86_64-debug

      - name: Configure
        run: cmake --preset x86-64-linux-debug

      - name: Build Runtime
        run: cmake --build --preset runtime-x86-64-linux-debug
