name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every job below builds one "triplet" from the Arch/OS/Profile/Compiler matrix declared in
# cmake/SturdyMatrix.cmake and generated into the committed CMakePresets.json by
# cmake/GeneratePresets.cmake. Only combinations where the runner's native OS/arch matches the
# target are included: cross-arch/cross-OS presets configure as source-views-only per
# SturdyMatrix.cmake's own documentation (no sysroot wired up to actually link them), so they
# are not buildable in CI. Each job builds Debug via the generated "runtime-<preset>" build
# preset (Runtime target only) with Clang, matching the project's default compiler.
jobs:
  linux-x86_64:
    name: Linux x86-64 (Debug, Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages (Ninja, Clang, GLFW's X11/Wayland dev deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang lld pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Cache third-party sources (.cache/deps)
        uses: actions/cache@v4
        with:
          path: .cache/deps
          key: deps-src-${{ hashFiles('cmake/SturdyDependencies.cmake') }}
          restore-keys: deps-src-

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-x86_64-debug

      - name: Configure
        run: cmake --preset x86-64-linux-debug

      - name: Build Runtime
        run: cmake --build --preset runtime-x86-64-linux-debug

  linux-arm64:
    name: Linux Arm64 (Debug, Clang)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages (Ninja, Clang, GLFW's X11/Wayland dev deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang lld pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Cache third-party sources (.cache/deps)
        uses: actions/cache@v4
        with:
          path: .cache/deps
          key: deps-src-${{ hashFiles('cmake/SturdyDependencies.cmake') }}
          restore-keys: deps-src-

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-arm64-debug

      - name: Configure
        run: cmake --preset arm64-linux-debug

      - name: Build Runtime
        run: cmake --build --preset runtime-arm64-linux-debug

  windows-x86_64:
    name: Windows x86-64 (Debug, Clang)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # clang/clang++ ship preinstalled on the windows-latest image, but linking still needs the
      # MSVC toolchain's Windows SDK/UCRT libs, so the Developer Command Prompt environment must
      # be initialized first. Deliberately no `shell: bash` on this job's steps: GitHub Actions
      # prepends GNU tool paths ahead of MSVC's when bash is used, which shadows link.exe with
      # /usr/bin/link.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          install_runtime: true
          cache: true

      - name: Cache third-party sources (.cache/deps)
        uses: actions/cache@v4
        with:
          path: .cache/deps
          key: deps-src-${{ hashFiles('cmake/SturdyDependencies.cmake') }}
          restore-keys: deps-src-

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: windows-x86_64-debug

      - name: Configure
        run: cmake --preset x86-64-win-debug

      - name: Build Runtime
        run: cmake --build --preset runtime-x86-64-win-debug

  macos-x86_64:
    name: macOS x86-64 (Debug, Clang)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Install Vulkan SDK (MoltenVK)
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Cache third-party sources (.cache/deps)
        uses: actions/cache@v4
        with:
          path: .cache/deps
          key: deps-src-${{ hashFiles('cmake/SturdyDependencies.cmake') }}
          restore-keys: deps-src-

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-x86_64-debug

      - name: Configure
        run: cmake --preset x86-64-macos-debug

      - name: Build Runtime
        run: cmake --build --preset runtime-x86-64-macos-debug

  macos-arm64:
    name: macOS Arm64 (Debug, Clang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Install Vulkan SDK (MoltenVK)
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Cache third-party sources (.cache/deps)
        uses: actions/cache@v4
        with:
          path: .cache/deps
          key: deps-src-${{ hashFiles('cmake/SturdyDependencies.cmake') }}
          restore-keys: deps-src-

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-arm64-debug

      - name: Configure
        run: cmake --preset arm64-macos-debug

      - name: Build Runtime
        run: cmake --build --preset runtime-arm64-macos-debug

  # --- Niche platforms below: best-effort, does not gate the required core matrix above. ---

  web:
    name: Web / Emscripten (Debug) [best-effort]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ninja-build

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Cache third-party sources (.cache/deps)
        uses: actions/cache@v4
        with:
          path: .cache/deps
          key: deps-src-${{ hashFiles('cmake/SturdyDependencies.cmake') }}
          restore-keys: deps-src-

      - name: Configure
        env:
          STURDY_EMSCRIPTEN_ROOT: ${{ env.EMSDK }}/upstream/emscripten
        run: cmake --preset x86-64-web-debug

      - name: Build Runtime
        run: cmake --build --preset runtime-x86-64-web-debug

  freebsd:
    name: FreeBSD x86-64 (Debug) [best-effort]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # FreeBSD has no official LunarG Vulkan SDK distribution, so this relies on whatever
      # vulkan-loader/vulkan-headers the ports tree currently carries — it may lag the 1.4
      # baseline the rest of the matrix uses. Kept best-effort (continue-on-error) for that
      # reason.
      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: x86_64
          usesh: true
          # clang/clang++ ship in the FreeBSD base system already (no llvm port needed) and
          # match the "clang"/"clang++" compiler names the base configure preset expects.
          prepare: |
            pkg install -y cmake ninja git pkgconf \
              vulkan-loader vulkan-headers \
              xorgproto libX11 libXrandr libXinerama libXcursor libXi \
              libxkbcommon wayland wayland-protocols
          run: |
            cmake --preset x86-64-freebsd-debug
            cmake --build --preset runtime-x86-64-freebsd-debug
